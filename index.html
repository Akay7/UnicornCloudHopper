<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦄 Unicorn Cloud Hopper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0533; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; border-radius: 12px; box-shadow: 0 0 40px rgba(180,100,255,0.4); cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import { drawUnicorn } from './src/drawUnicorn.js';
import { drawCloud }   from './src/drawCloud.js';
import { drawSun }     from './src/drawSun.js';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive sizing
const W = canvas.width  = Math.min(window.innerWidth,  700);
const H = canvas.height = Math.min(window.innerHeight, 480);

// ── Sky gradient ──────────────────────────────────────────────
const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
skyGrad.addColorStop(0,   '#6ed6ff');
skyGrad.addColorStop(0.6, '#b8eaff');
skyGrad.addColorStop(1,   '#dff6ff');

// ── Stars (bg decoration) ────────────────────────────────────
const stars = Array.from({length: 18}, () => ({
  x: Math.random() * W, y: Math.random() * H * 0.5,
  r: Math.random() * 2 + 1, a: Math.random()
}));

// ── Physics constants ─────────────────────────────────────────
const GRAVITY    =  0.38;
const FLAP_FORCE = -7.5;
const CLOUD_SPD  =  2.2;

// ── Game state ────────────────────────────────────────────────
let state, uni, clouds, score, hi, particles, bgClouds, frame;

function reset() {
  state  = 'start'; // 'play' | 'dead'
  score  = 0;
  hi     = hi || 0;
  frame  = 0;

  uni = {
    x: W * 0.22, y: H * 0.5,
    vy: 0, angle: 0,
    w: 70, h: 38,
    onCloud: false, dead: false,
    fallY: 0
  };

  // Starting cloud under unicorn
  clouds = [
    { x: uni.x - 30, y: H * 0.5 + uni.h * 0.5 - 2, w: 120, h: 38, passed: false }
  ];

  // Schedule next clouds
  for (let i = 1; i < 5; i++) spawnCloud(true, i);

  // Background decorative clouds
  bgClouds = Array.from({length: 6}, (_, i) => ({
    x: (W / 6) * i * 1.2,
    y: Math.random() * H * 0.45 + 20,
    w: 80 + Math.random() * 60,
    alpha: 0.25 + Math.random() * 0.25,
    spd: 0.4 + Math.random() * 0.4
  }));

  particles = [];
}

function spawnCloud(initial, idx) {
  const last = clouds[clouds.length - 1];
  const gapMin = 160, gapMax = 260;
  const gap = gapMin + Math.random() * (gapMax - gapMin);
  const baseX = initial ? (uni.x + 90 + idx * (gapMin + 80)) : last.x + gap;
  const minY  = H * 0.18, maxY = H * 0.72;
  clouds.push({
    x: baseX,
    y: minY + Math.random() * (maxY - minY),
    w: 100 + Math.random() * 50,
    h: 36,
    passed: false
  });
}

function addParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 2,
      life: 1, color, size: 3 + Math.random()*4 });
  }
}

// ── Input ─────────────────────────────────────────────────────
function flap() {
  if (state === 'start') { state = 'play'; }
  if (state === 'play' && !uni.dead) {
    uni.vy = FLAP_FORCE;
    addParticles(uni.x - 28, uni.y + 4, '#e8b4ff');
  }
  if (state === 'dead') reset();
}
canvas.addEventListener('click',   flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, {passive:false});
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); }});


function drawHUD() {
  // Score
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.fillStyle = '#5c2d91';
  ctx.textAlign = 'left';
  ctx.shadowColor = 'rgba(255,255,255,0.8)'; ctx.shadowBlur = 6;
  ctx.fillText(`☁️ ${score}`, 16, 32);
  if (hi > 0) {
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText(`Best: ${hi}`, 16, 52);
  }
  ctx.shadowBlur = 0;
}

function drawScreen(title, sub) {
  ctx.fillStyle = 'rgba(80,0,120,0.55)';
  ctx.beginPath();
  ctx.roundRect(W/2-160, H/2-70, 320, 140, 20);
  ctx.fill();

  ctx.font = 'bold 28px "Segoe UI", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.shadowColor='rgba(200,100,255,0.9)'; ctx.shadowBlur=12;
  ctx.fillText(title, W/2, H/2 - 18);
  ctx.shadowBlur=0;

  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.fillStyle = '#e8d5ff';
  ctx.fillText(sub, W/2, H/2 + 18);
  if (state === 'dead') {
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillStyle = '#ffd6ff';
    ctx.fillText(`Score: ${score}  |  Best: ${Math.max(score,hi)}`, W/2, H/2+46);
  }
}

// ── Update ────────────────────────────────────────────────────
function update() {
  frame++;

  // Scroll bg clouds
  bgClouds.forEach(c => {
    c.x -= c.spd;
    if (c.x + c.w < 0) { c.x = W + 20; c.y = Math.random()*H*0.45+20; }
  });

  if (state !== 'play') return;

  // Gravity & movement
  uni.vy += GRAVITY;
  uni.y  += uni.vy;
  uni.angle = Math.max(-0.4, Math.min(0.5, uni.vy * 0.055));

  // Scroll clouds
  clouds.forEach(c => c.x -= CLOUD_SPD);

  // Remove off-screen clouds
  while (clouds.length && clouds[0].x + clouds[0].w < 0) clouds.shift();

  // Spawn new clouds
  if (clouds[clouds.length-1].x < W + 20) spawnCloud(false, 0);

  // Score
  clouds.forEach(c => {
    if (!c.passed && c.x + c.w < uni.x) { c.passed = true; score++; if(score>hi)hi=score; }
  });

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.035;
  });
  particles = particles.filter(p => p.life > 0);

  // Cloud landing
  uni.onCloud = false;
  for (const c of clouds) {
    const feet = uni.y + uni.h*0.45;
    const inX  = uni.x > c.x + 10 && uni.x < c.x + c.w - 10;
    const onTop = feet >= c.y && feet <= c.y + 14 && uni.vy >= 0;
    if (inX && onTop) {
      uni.y = c.y - uni.h*0.45;
      uni.vy = 0;
      uni.onCloud = true;
      break;
    }
  }

  // Death: fell below screen or went off top
  if (uni.y > H + 20 || uni.y < -80) {
    uni.dead = true;
    state = 'dead';
    addParticles(uni.x, uni.y < 0 ? 40 : H-40, '#ff6bcd');
  }
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  // Sky
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Faint stars / sparkles
  stars.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,160,255,${0.2+Math.abs(Math.sin(frame*0.02+s.a))*0.4})`;
    ctx.fill();
  });

  // Background clouds
  bgClouds.forEach(c => drawCloud(ctx, c.x, c.y, c.w, 30, c.alpha));

  // Game clouds
  clouds.forEach(c => drawCloud(ctx, c.x, c.y, c.w, c.h));

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Unicorn
  const flicker = state === 'dead';
  drawUnicorn(ctx, uni.x, uni.y, uni.angle, flicker, frame, uni.onCloud, state === 'play');

  // Sun
  drawSun(ctx, W, frame);

  // HUD
  if (state !== 'start') drawHUD();

  // Overlays
  if (state === 'start') {
    drawScreen('🦄 Cloud Hopper', 'Click / Tap / Space to fly!');
  } else if (state === 'dead') {
    drawScreen('💫 Oops! You fell!', 'Click to try again');
  }
}

// ── Loop ──────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
